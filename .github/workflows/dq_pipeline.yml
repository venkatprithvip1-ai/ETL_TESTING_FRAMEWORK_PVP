# .github/workflows/dq_pipeline.yml
# ============================================================
# ETL DQ Framework v6 — CI/CD Pipeline
# ============================================================
# This runs automatically on every push and pull request.
# It:
#   1. Installs Python and dependencies
#   2. Runs all unit tests
#   3. Generates sample data
#   4. Runs DQ checks on all 5 datasets
#   5. Uploads the HTML report as an artifact
#   6. Fails the pipeline if more than 0 tests fail
#
# To use this:
#   1. Push your project to GitHub
#   2. This file must be at: .github/workflows/dq_pipeline.yml
#   3. Every git push will trigger this workflow
# ============================================================

name: ETL DQ Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Also runs daily at 6 AM UTC — catches stale data automatically
    - cron: '0 6 * * *'

jobs:

  # ── Job 1: Unit Tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java (required by Spark)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version:  '11'

      - name: Install dependencies
        working-directory: etl_dq_v6
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        working-directory: etl_dq_v6
        run: |
          pytest tests/ -v --tb=short \
            --cov=checkers --cov=core --cov=runner \
            --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: etl_dq_v6/coverage.xml
          fail_ci_if_error: false


  # ── Job 2: Full DQ Run ───────────────────────────────────────────────────────
  dq-checks:
    name: DQ Checks — All Datasets
    runs-on: ubuntu-latest
    needs: unit-tests    # only runs if unit tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install dependencies
        working-directory: etl_dq_v6
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sample data
        working-directory: etl_dq_v6
        run: python data/generate_sample_data.py

      - name: Run DQ checks (no HTML report for speed)
        working-directory: etl_dq_v6
        run: python main_v6.py --no-report
        env:
          PYTHONPATH: .
          # Optionally set alert credentials as GitHub Secrets:
          # DQ_EMAIL_PASSWORD: ${{ secrets.DQ_EMAIL_PASSWORD }}

      - name: Run DQ checks with HTML report
        working-directory: etl_dq_v6
        run: python main_v6.py
        env:
          PYTHONPATH: .

      - name: Upload HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dq-report-${{ github.run_number }}
          path: etl_dq_v6/reports/dq_report_*.html
          retention-days: 30    # keep reports for 30 days

      - name: Upload JSON results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dq-json-${{ github.run_number }}
          path: etl_dq_v6/reports/dq_results_*.json
          retention-days: 90

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()    # upload even if checks fail
        with:
          name: dq-logs-${{ github.run_number }}
          path: etl_dq_v6/logs/*.log
          retention-days: 14
